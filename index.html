<style>
  :root{--m50:#f6faf5;--m100:#e6f0e2;--m200:#c9dec1;--m500:#4a7c59;--m600:#3a6647;--m700:#2d5a3d;--m900:#173324;
    --ink:#1c2620;--muted:#5d6b62;--line:#e3ece0;--gold:#d9a441;--card:#fff;--bg:#eef3ec;
    --shadow:0 6px 24px rgba(23,51,36,.10);--shadow-lg:0 18px 50px rgba(23,51,36,.22);--r:18px;}
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:"Segoe UI",system-ui,-apple-system,"Malgun Gothic","Apple SD Gothic Neo",sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  img{display:block;max-width:100%}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  a{color:inherit}
  input,select,textarea{font-family:inherit}
  header{position:sticky;top:0;z-index:40;background:rgba(45,90,61,.93);backdrop-filter:blur(10px);color:#fff;box-shadow:0 2px 16px rgba(23,51,36,.18)}
  .nav{max-width:1120px;margin:0 auto;padding:11px 20px;display:flex;align-items:center;gap:12px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px}
  .brand .logo{font-size:24px}
  .brand small{display:block;font-weight:500;font-size:11px;opacity:.8;letter-spacing:2px;text-transform:uppercase}
  .spacer{flex:1}
  .navbtn{border:1.5px solid rgba(255,255,255,.55);border-radius:999px;color:#fff;padding:7px 15px;font-weight:700;font-size:13px;transition:.2s}
  .navbtn:hover{background:#fff;color:var(--m700)}
  .navbtn.solid{background:var(--gold);border-color:var(--gold);color:#3a2c08}
  .navbtn.solid:hover{background:#e7b964}
  .userchip{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:700}
  .userchip .av{width:30px;height:30px;border-radius:50%;background:var(--gold);color:#3a2c08;display:flex;align-items:center;justify-content:center;font-weight:800}
  .userchip .badge{background:rgba(255,255,255,.16);padding:5px 10px;border-radius:999px;cursor:pointer}
  /* subnav */

  .subnav .in{max-width:1120px;margin:0 auto;display:flex;gap:4px;padding:0 14px}

  .subnav button.on{color:#fff;border-bottom-color:var(--gold)}
  .subnav button:hover{color:#fff}
  .hero{position:relative;color:#fff;text-align:center;overflow:hidden;
    background:linear-gradient(180deg,rgba(23,51,36,.55),rgba(23,51,36,.8)),

  .hero .ko{color:var(--gold)}
  .hero p{margin-top:16px;font-size:clamp(14px,2.3vw,17px);opacity:.92}
  .hero .stats{margin-top:26px;display:flex;gap:28px;justify-content:center;flex-wrap:wrap}

  .hero .stats span{font-size:11px;letter-spacing:1px;text-transform:uppercase;opacity:.85}
  .wrap{max-width:1120px;margin:0 auto;padding:0 20px}
  .view{display:none}.view.on{display:block}
  .controls{margin:-30px auto 0;position:relative;z-index:5;background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:18px;display:flex;gap:14px;flex-wrap:wrap;align-items:center}

  .card .meta{display:flex;gap:8px;flex-wrap:wrap}

  .tag.diff{color:#fff}.d-easy{background:#4f9d69}.d-mod{background:#cf922f}.d-hard{background:#c5573e}

  .card .foot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--line);padding-top:11px}
  .card .region{font-size:13px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:5px}

  .m-hero .close{position:absolute;top:16px;right:16px;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.45);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);transition:.18s;z-index:3}

  .hl li{display:flex;gap:10px;font-size:14.5px;line-height:1.5}.hl li::before{content:"⛰";flex:none}

  .yourrate .lbl{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .ratemsg{font-size:13px;color:var(--m600);font-weight:700;margin-top:6px;min-height:16px}

  .btn{flex:1;min-width:130px;text-align:center;padding:13px;border-radius:12px;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;transition:.18s;text-decoration:none}
  .btn-naver{background:#03c75a;color:#fff}.btn-naver:hover{filter:brightness(.93)}
  .btn-g{background:#fff;color:var(--m700);border:1.5px solid var(--m200)}.btn-g:hover{background:var(--m50)}
  .btn-vid{background:#ff0033;color:#fff}.btn-vid:hover{filter:brightness(.92)}
  .btn-ig{background:#c13584;color:#fff}.btn-ig:hover{filter:brightness(.93)}

  .rv{border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px}
  .rv .rvtop{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .rv .who{font-weight:800;color:var(--m700);font-size:14px}
  .rv .rvstars{font-size:14px;color:var(--gold)}
  .rv .rvtime{margin-left:auto;font-size:12px;color:var(--muted)}

  /* leaderboard */
  .progress-card{background:linear-gradient(135deg,var(--m600),var(--m900));color:#fff;border-radius:18px;padding:24px;margin:30px 0 24px;box-shadow:var(--shadow)}

/* ── Climbed ── */
const VERIFY_RADIUS=800;
function distM(la1,lo1,la2,lo2){const R=6371000,r=x=>x*Math.PI/180;const dLa=r(la2-la1),dLo=r(lo2-lo1);const a=Math.sin(dLa/2)**2+Math.cos(r(la1))*Math.cos(r(la2))*Math.sin(dLo/2)**2;return 2*R*Math.asin(Math.sqrt(a))}
function climbedRec(id){return _climbed[id]||null}
function isClimbed(id){return!!_climbed[id]}
async function markClimbed(id,verified,dist){
  if(!_user)return;
  const data={verified:!!verified,ts:Date.now(),dist:dist==null?null:Math.round(dist)};
  _climbed[id]=data;
  await db.collection("climbed").doc(_user.uid).collection("mountains").doc(id).set(data);
  _recalcPoints();
}
async function unclimb(id){
  if(!_user)return;
  delete _climbed[id];
  await db.collection("climbed").doc(_user.uid).collection("mountains").doc(id).delete();
  _recalcPoints();
}
function afterClimb(id){openModal(id);renderAuth();renderGrid();if(view==="leaderboard")renderLeaderboard()}
function verifyClimb(m,btn){
  if(!navigator.geolocation){if(confirm(t("ask_self")))markClimbed(m.id,false,null).then(()=>afterClimb(m.id));return}
  btn.disabled=true;btn.textContent=t("verifying");
  navigator.geolocation.getCurrentPosition(pos=>{
    const d=distM(pos.coords.latitude,pos.coords.longitude,m.lat,m.lng);
    if(d<=VERIFY_RADIUS)markClimbed(m.id,true,d).then(()=>afterClimb(m.id));
    else if(confirm(lang==="ko"?`정상에서 약 ${(d/1000).toFixed(1)}km 떨어져 있어요.\n'자가 신고'로 기록할까요?`:`You're ~${(d/1000).toFixed(1)}km from the summit.\nRecord as self-reported instead?`))markClimbed(m.id,false,d).then(()=>afterClimb(m.id));
    else afterClimb(m.id);
  },()=>{
    if(confirm(lang==="ko"?"위치를 확인할 수 없어요.\n'자가 신고'로 기록할까요?":"Couldn't get your location.\nRecord as self-reported instead?"))markClimbed(m.id,false,null).then(()=>afterClimb(m.id));
    else afterClimb(m.id);
  },{enableHighAccuracy:true,timeout:12000,maximumAge:60000});
}

/* ── Points recalc (writes to Firestore user doc) ── */
const DIFF_PTS={easy:{v:6,s:2},moderate:{v:10,s:3},hard:{v:16,s:5}};

/* ── Badges ── */
const BADGES=[
  {id:"first",icon:"🌱",get ko(){return t("badge_first_ko")},get en(){return t("badge_first_en")}},
  {id:"5peaks",icon:"⛰",get ko(){return t("badge_5_ko")},get en(){return t("badge_5_en")}},
  {id:"10peaks",icon:"🏔",get ko(){return t("badge_10_ko")},get en(){return t("badge_10_en")}},
  {id:"30peaks",icon:"👑",get ko(){return t("badge_30_ko")},get en(){return t("badge_30_en")}},
  {id:"yeongnam",icon:"🦅",get ko(){return t("badge_yeongnam_ko")},get en(){return t("badge_yeongnam_en")}},
  {id:"reviewer",icon:"📝",get ko(){return t("badge_reviewer_ko")},get en(){return t("badge_reviewer_en")}},
  {id:"gps10",icon:"📍",get ko(){return t("badge_gps10_ko")},get en(){return t("badge_gps10_en")}},
  {id:"hard5",icon:"💪",get ko(){return t("badge_hard5_ko")},get en(){return t("badge_hard5_en")}},
];
const YEONGNAM_IDS=["gajisan","sinbulsan","ganwolsan","goheonsan","cheonhwangsan"];
function computeBadges(climbedIds,userData){
  const s=new Set(climbedIds);
  const total=climbedIds.length;
  const earned=[];
  if(total>=1)earned.push("first");
  if(total>=5)earned.push("5peaks");
  if(total>=10)earned.push("10peaks");
  if(total>=30)earned.push("30peaks");
  if(YEONGNAM_IDS.every(id=>s.has(id)))earned.push("yeongnam");
  if((userData.reviewCount||0)>=5)earned.push("reviewer");
  if((userData.summitCount||0)>=10)earned.push("gps10");
  const hardCount=climbedIds.filter(id=>{const m=Mtn(id);return m&&m.diff==="hard"}).length;
  if(hardCount>=5)earned.push("hard5");
  return earned;
}
function badgesHTML(earnedIds){
  return BADGES.map(b=>{
    const got=earnedIds.includes(b.id);
    return `<div class="badge-item${got?"":" locked"}" title="${got?(lang==="ko"?b.ko:b.en):t("badge_locked")}">
      <span class="bi">${b.icon}</span><span class="bn">${lang==="ko"?b.ko:b.en}</span></div>`;
  }).join("");
}

async function _recalcPoints(){
  if(!_user||!_userData)return;
  let climbPts=0,ver=0,unv=0;
  for(const id of Object.keys(_climbed)){
    const m=Mtn(id);const dp=DIFF_PTS[(m&&m.diff)||"moderate"];
    if(_climbed[id]&&_climbed[id].verified){ver++;climbPts+=dp.v;}
    else{unv++;climbPts+=dp.s;}
  }
  let reviews=0;for(const mId in _reviewsCache)reviews+=_reviewsCache[mId].filter(r=>r.uid===_user.uid).length;
  let rated=0;for(const mId in _ratingsCache)if(_ratingsCache[mId][_user.uid]!=null)rated++;
  const points=climbPts+reviews*5+rated*2;
  const climbedIds=Object.keys(_climbed);
  const earnedBadges=computeBadges(climbedIds,{summitCount:ver,reviewCount:reviews});
  await db.collection("users").doc(_user.uid).update({summitCount:ver,selfCount:unv,reviewCount:reviews,ratingCount:rated,points,badges:earnedBadges});
  _userData={..._userData,summitCount:ver,selfCount:unv,reviewCount:reviews,ratingCount:rated,points,badges:earnedBadges};
  renderAuth();
}

/* ── Hiker Photo Upload ── */
async function resizeImage(file,maxSide=1280,quality=0.82){
  return new Promise((res,rej)=>{
    const img=new Image();const burl=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(burl);
      let w=img.width,h=img.height;
      if(w>maxSide||h>maxSide){const sc=maxSide/Math.max(w,h);w=Math.round(w*sc);h=Math.round(h*sc)}
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      c.toBlob(b=>b?res(b):rej(new Error("canvas")),"image/jpeg",quality);
    };
    img.onerror=rej;img.src=burl;
  });
}

async function uploadPhoto(mid,file,onProgress){
  const s=session();if(!s)return;
  if(!file.type.startsWith("image/"))throw new Error(t("photos_err_type"));
  const mine=(_photosCache[mid]||[]).filter(p=>p.uid===s.uid);
  if(mine.length>=3)throw new Error(t("photos_err_max"));
  const blob=await resizeImage(file);
  const path=`photos/${mid}/${s.uid}_${Date.now()}.jpg`;
  const ref=storage.ref(path);
  const task=ref.put(blob,{contentType:"image/jpeg"});
  await new Promise((res,rej)=>task.on("state_changed",snap=>{onProgress&&onProgress(Math.round(snap.bytesTransferred/snap.totalBytes*100))},rej,res));
  const url=await ref.getDownloadURL();
  const doc={uid:s.uid,nickname:s.nickname,url,path,ts:Date.now()};
  const ref2=await db.collection("photos").doc(mid).collection("entries").add(doc);
  if(!_photosCache[mid])_photosCache[mid]=[];
  _photosCache[mid].unshift({id:ref2.id,...doc});
}
async function deletePhoto(mid,photoId,path){
  await db.collection("photos").doc(mid).collection("entries").doc(photoId).delete();
  try{await storage.ref(path).delete()}catch{}
  if(_photosCache[mid])_photosCache[mid]=_photosCache[mid].filter(p=>p.id!==photoId);
}

let _leafletLoaded=false;
function openMapModal(){
  document.getElementById("mapModalTitle").textContent=t("my_map_title");
  document.getElementById("mapOverlay").classList.add("open");
  document.body.style.overflow="hidden";
  const body=document.getElementById("mapModalBody");
  body.innerHTML=`<div id="leafletMap" style="width:100%;height:100%"></div>`;
  if(!_leafletLoaded){
    const link=document.createElement("link");link.rel="stylesheet";link.href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css";document.head.appendChild(link);
    const scr=document.createElement("script");scr.src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";
    scr.onload=()=>{_leafletLoaded=true;_renderLeaflet()};
    document.head.appendChild(scr);
  }else{_renderLeaflet()}
}
function _renderLeaflet(){
  const climbed=new Set(Object.keys(_climbed));
  const map=L.map("leafletMap",{center:[36.5,127.8],zoom:7});
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap",maxZoom:17}).addTo(map);
  MOUNTAINS.forEach(m=>{
    const done=climbed.has(m.id);
    const icon=L.divIcon({className:"",html:`<div style="width:28px;height:28px;border-radius:50%;background:${done?"#E7B64B":"#9ca3af"};border:3px solid ${done?"#fff":"#6b7280"};display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,.35)">${done?"⛰":"▲"}</div>`,iconSize:[28,28],iconAnchor:[14,14]});
    L.marker([m.lat,m.lng],{icon}).addTo(map)
      .bindPopup(`<b>${lang==="ko"?m.ko:m.en}</b><br>${m.elev}m · ${done?"<span style=color:#b45309>"+t("map_climbed")+"</span>":t("map_not_yet")}`)
      .on("click",()=>{closeMapModal();openModal(m.id)});
  });
}

async function leaderboard(){
  const snap=await db.collection("users").orderBy("points","desc").limit(50).get();
  const arr=[];
  snap.forEach(doc=>{const d=doc.data();arr.push({uid:doc.id,email:d.email||"",nickname:d.nickname||"?",points:d.points||0,climbed:(d.summitCount||0)+(d.selfCount||0),ver:d.summitCount||0,unv:d.selfCount||0,reviews:d.reviewCount||0,rated:d.ratingCount||0,badges:d.badges||[]});});
  arr.forEach((x,i)=>x.rank=i+1);return arr;
}

async function doForgotPassword(){

  try{

async function doGoogleAuth(){
  const err=document.getElementById("aerr"); err.textContent="";
  const btn=document.getElementById("googleBtn"); btn.disabled=true;
  try{
    const provider=new firebase.auth.GoogleAuthProvider();
    const result=await auth.signInWithPopup(provider);
    const user=result.user;
    const doc=await db.collection("users").doc(user.uid).get();
    if(!doc.exists){
      const nickname=user.displayName||user.email.split("@")[0];
      _userData={nickname,email:user.email,summitCount:0,selfCount:0,reviewCount:0,ratingCount:0,points:0};
      await db.collection("users").doc(user.uid).set({..._userData,nickname_lower:nickname.toLowerCase(),joinedAt:firebase.firestore.FieldValue.serverTimestamp()});
      _user=user; _climbed={};
    }
    closeAuth();
  }catch(e){
    if(e.code!=="auth/popup-closed-by-user") err.textContent=e.message;
    btn.disabled=false;
  }
}
async function doAuth(){
  const err=document.getElementById("aerr");
  const email=(document.getElementById("f_email").value||"").trim().toLowerCase();
  const pw=document.getElementById("f_pw").value||"";
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){err.textContent=lang==="ko"?"올바른 이메일을 입력하세요.":"Enter a valid email.";return}
  if(pw.length<4){err.textContent=lang==="ko"?"비밀번호는 4자 이상이어야 해요.":"Password must be at least 4 characters.";return}
  if(authMode==="signup"){const pw2El=document.getElementById("f_pw2");if(pw2El&&pw2El.value!==pw){err.textContent=t("pw_mismatch");return}}
  const btn=document.getElementById("aSubmit");btn.disabled=true;btn.textContent="…";err.textContent="";
  try{
    if(authMode==="signup"){
      const nick=(document.getElementById("f_nick").value||"").trim();
      if(nick.length<2){err.textContent=lang==="ko"?"닉네임을 입력하세요(2자 이상).":"Enter a nickname (2+ chars).";btn.disabled=false;btn.textContent=t("create_account");return}
      try{
        const nickQ=await db.collection("users").where("nickname_lower","==",nick.toLowerCase()).get();
        if(!nickQ.empty){err.textContent=lang==="ko"?"이미 사용 중인 닉네임이에요.":"That nickname is taken.";btn.disabled=false;btn.textContent=t("create_account");return}
      }catch(_){/* skip uniqueness check if rules block query */}
      const cred=await auth.createUserWithEmailAndPassword(email,pw);
      _userData={nickname:nick,email,summitCount:0,selfCount:0,reviewCount:0,ratingCount:0,points:0};
      await db.collection("users").doc(cred.user.uid).set({..._userData,nickname_lower:nick.toLowerCase(),joinedAt:firebase.firestore.FieldValue.serverTimestamp()});
      _user=cred.user;_climbed={};
    }else{
      await auth.signInWithEmailAndPassword(email,pw);
    }
    closeAuth();
  }catch(e){
    const c=e.code||"";
    if(c==="auth/email-already-in-use")err.textContent=lang==="ko"?"이미 가입된 이메일이에요.":"Email already registered.";
    else if(c==="auth/user-not-found"||c==="auth/wrong-password"||c==="auth/invalid-credential")err.textContent=lang==="ko"?"이메일 또는 비밀번호가 올바르지 않아요.":"Wrong email or password.";
    else err.textContent=e.message;
    btn.disabled=false;btn.textContent=authMode==="login"?t("login"):t("create_account");
  }
}

function buildFilters(){
  if(activeFilter==="mine"&&!session())activeFilter="all";
  const order=["all","easy","moderate","hard","alps"];
  if(session())order.push("mine");
  document.getElementById("filters").innerHTML=order.map(d=>`<button class="chip ${d==="mine"?"mine ":""}${d===activeFilter?"active":""}" data-f="${d}">${d==="mine"?t("myclimbs"):t(d)}</button>`).join("");
  document.querySelectorAll("#filters .chip").forEach(c=>c.onclick=()=>{activeFilter=c.dataset.f;buildFilters();renderGrid()});
  // Province dropdown
  const sel=document.getElementById("prov-select");
  if(sel){sel.innerHTML=PROVINCES.map(p=>`<option value="${p}"${p===activeProv?"selected":""}>${t("prov_"+p)}</option>`).join("");
    sel.onchange=()=>{activeProv=sel.value;renderGrid();};}
}
function filtered(){const q=query.trim().toLowerCase();
  return MOUNTAINS.filter(m=>{
    if(activeProv!=="all"&&m.prov!==activeProv)return false;
    if(activeFilter==="mine"){if(!isClimbed(m.id))return false}
    else if(activeFilter==="alps"){if(!m.yeongnam)return false}
    else if(activeFilter!=="all"&&m.diff!==activeFilter)return false;
    if(!q)return true;
    return[m.en,m.ko,m.region_en,m.region_ko].join(" ").toLowerCase().includes(q);
  });
}
function renderGrid(){
  const list=filtered();document.getElementById("count").textContent=`${list.length} ${t("results")}`;
  const grid=document.getElementById("grid");
  if(!list.length){grid.innerHTML=`<div class="empty">🔍 No mountains found.</div>`;return}
  grid.innerHTML=list.map(m=>{
    const st=stats(m.id);
    const gradBg=`background-image:linear-gradient(135deg,${m.color[0]},${m.color[1]})`;
    const _cimg=cardImgUrl(m);
    const phImg=_cimg?`<img class="ph-img" src="${_cimg}" loading="lazy" onerror="this.remove()" alt="">` : "";

  };

    if(confirm(t("confirm_del")))delReview(m.id,d.dataset.del).then(()=>{openModal(m.id);renderGrid()});

  /* photo grid: lightbox on image click */
  document.querySelectorAll("#photoGrid img").forEach(img=>img.onclick=()=>openLightbox(img.dataset.url));
  /* admin: set featured photo */
  document.querySelectorAll(".pg-feat").forEach(btn=>btn.onclick=async()=>{
    const url=btn.dataset.url;
    const alreadyFeatured=_featuredPhotos[m.id]===url;
    _featuredPhotos[m.id]=alreadyFeatured?null:url;
    await db.collection("config").doc("featuredPhotos").set(_featuredPhotos);
    renderGrid();openModal(m.id);
  });
  /* photo delete buttons */
  document.querySelectorAll(".pg-del").forEach(btn=>btn.onclick=async()=>{
    if(!confirm(t("confirm_del")))return;
    btn.disabled=true;
    await deletePhoto(m.id,btn.dataset.pid,btn.dataset.path);
    openModal(m.id);
  });
  /* photo upload */
  const upBtn=document.getElementById("photoUploadBtn");
  const upInput=document.getElementById("photoInput");
  if(upBtn&&upInput){
    upBtn.onclick=()=>upInput.click();
    upInput.onchange=async()=>{
      const file=upInput.files[0];if(!file)return;
      upBtn.disabled=true;upBtn.textContent=t("photos_uploading");
      const prog=document.getElementById("pgProgress");
      try{
        await uploadPhoto(m.id,file,p=>{if(prog)prog.textContent=p+"%"});
        openModal(m.id);
      }catch(e){
        if(prog){prog.style.color="red";prog.textContent=e.message;}
        upBtn.disabled=false;upBtn.textContent=t("photos_upload");
      }
    };
  }
}

    <p style="color:var(--muted);margin:-8px 0 18px;font-size:14.5px">${t("fb_intro")}</p>${cards}`;
  document.getElementById("fbNewBtn").onclick=()=>{if(!session()){openAuth("login");return}openFeedbackForm()};
  el.querySelectorAll("[data-fres]").forEach(b=>b.onclick=async()=>{
    await db.collection("feedback").doc(b.dataset.fres).update({resolved:true});renderFeedback();
  });
  el.querySelectorAll("[data-fdel]").forEach(b=>b.onclick=async()=>{
    if(confirm(t("confirm_del"))){await db.collection("feedback").doc(b.dataset.fdel).delete();renderFeedback();}
  });
}
function openFeedbackForm(){
  document.getElementById("feedbackBox").innerHTML=`
    <div class="fh"><button class="close" id="fbClose">✕</button><h3>💬 ${t("fb_title")}</h3><p>${t("fb_intro")}</p></div>
    <div class="fbody"><div class="ferr" id="fberr"></div>
      <div class="field"><label>${t("fb_type")}</label>
        <select id="fb_type" style="background:#fff;color:#111;border:1px solid #ccc;border-radius:8px;padding:10px;width:100%">
          <option value="bug">${t("fb_type_bug")}</option>
          <option value="mtn">${t("fb_type_mtn")}</option>
        </select></div>
      <div class="field"><label>${t("fb_ttl")}</label><input id="fb_ttl" type="text" maxlength="80" placeholder="${lang==="ko"?"예: 정병산 추가 부탁드려요":"e.g. Please add Jeongbyeongsan"}"></div>
      <div class="field"><label>${t("fb_body")}</label><textarea id="fb_body" rows="4" style="width:100%;background:#fff;color:#111;border:1px solid #ccc;border-radius:8px;padding:10px;resize:vertical;box-sizing:border-box" maxlength="1000" placeholder="${lang==="ko"?"자세한 내용을 적어주세요 (선택)":"Additional details (optional)"}"></textarea></div>
      <div style="display:flex;gap:10px;margin-top:4px">
        <button class="navbtn" id="fbCancelBtn" style="flex:1">${t("fb_cancel")}</button>
        <button class="navbtn solid" id="fbSubmitBtn" style="flex:2;color:#3a2c08">${t("fb_submit")}</button>
      </div>
    </div>`;
  document.getElementById("feedbackOverlay").classList.add("open");
  document.getElementById("fbClose").onclick=closeFeedbackForm;
  document.getElementById("fbCancelBtn").onclick=closeFeedbackForm;
  document.getElementById("fbSubmitBtn").onclick=submitFeedback;
}
function closeFeedbackForm(){document.getElementById("feedbackOverlay").classList.remove("open")}
async function submitFeedback(){
  const s=session(); if(!s)return;
  const err=document.getElementById("fberr");
  const title=(document.getElementById("fb_ttl").value||"").trim();
  if(!title){err.textContent=lang==="ko"?"제목을 입력하세요.":"Please enter a title.";return}
  const type=document.getElementById("fb_type").value;
  const body=(document.getElementById("fb_body").value||"").trim();
  const btn=document.getElementById("fbSubmitBtn");btn.disabled=true;btn.textContent="…";
  const obj={uid:s.uid,nickname:_userData?.nickname||s.email.split("@")[0],type,title,body,resolved:false,ts:Date.now()};
  await db.collection("feedback").add(obj);
  closeFeedbackForm();renderFeedback();
}
document.getElementById("feedbackOverlay").onclick=e=>{if(e.target.id==="feedbackOverlay")closeFeedbackForm()};

/* ── Lang & Boot ── */
function applyLang(){
  document.documentElement.lang=lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>el.innerHTML=I18N[lang][el.dataset.i18n]??el.innerHTML);
  document.querySelectorAll("[data-i18n-ph]").forEach(el=>el.placeholder=I18N[lang][el.dataset.i18nPh]);
  document.getElementById("langBtn").textContent=lang==="en"?"한국어":"English";
  document.getElementById("statMtn").textContent=TOTAL;
  document.getElementById("statPark").textContent=MOUNTAINS.filter(m=>m.park).length;
  document.getElementById("statHigh").textContent=Math.max(...MOUNTAINS.map(m=>m.elev))+"m";
  refresh();
}
function refresh(){buildSubnav();buildFilters();renderAuth();renderGrid();
  if(view==="leaderboard")renderLeaderboard();if(view==="companions")renderCompanions();if(view==="trails")renderTrails();if(view==="feedback")renderFeedback();}

/* ── SOS ── */
function openSOS(){
  document.getElementById("sos-title").textContent=t("sos_title");
  document.getElementById("sos-body").textContent=t("sos_body");
  document.getElementById("sos-119").textContent=t("sos_119");
  document.getElementById("sos-112").textContent=t("sos_112");
  document.getElementById("sos-1588").textContent=t("sos_1588");
  document.getElementById("sos-1330").textContent=t("sos_1330");
  document.getElementById("sosGpsBtn").textContent=t("sos_gps");
  document.getElementById("sosGpsResult").textContent="";
  document.getElementById("sosOverlay").style.display="flex";
}
function closeSOS(){document.getElementById("sosOverlay").style.display="none"}
function shareGPS(){
  const btn=document.getElementById("sosGpsBtn"),res=document.getElementById("sosGpsResult");
  btn.textContent=t("sos_gps_loading");btn.disabled=true;
  if(!navigator.geolocation){res.textContent=t("sos_gps_fail");btn.disabled=false;btn.textContent=t("sos_gps");return}
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude.toFixed(5),lng=pos.coords.longitude.toFixed(5);
    const text=`GPS: ${lat}, ${lng}\nhttps://maps.google.com/?q=${lat},${lng}`;
    navigator.clipboard.writeText(text).catch(()=>{});
    res.textContent=t("sos_gps_done")+` (${lat}, ${lng})`;
    btn.textContent=t("sos_gps");btn.disabled=false;
  },()=>{res.textContent=t("sos_gps_fail");btn.textContent=t("sos_gps");btn.disabled=false;},{timeout:10000});
}
document.getElementById("sosOverlay").addEventListener("click",e=>{if(e.target.id==="sosOverlay")closeSOS()});

document.getElementById("langBtn").onclick=()=>{lang=lang==="en"?"ko":"en";applyLang();if(currentId)openModal(currentId)};

document.getElementById("authOverlay").onclick=e=>{if(e.target.id==="authOverlay")closeAuth()};
document.getElementById("mapOverlay").onclick=e=>{if(e.target.id==="mapOverlay")closeMapModal()};
document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeModal();closeAuth();closeCompForm();closeFeedbackForm();closeSOS();closeMapModal()}});
applyLang();
